<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1140 196" width="1140" height="196">
<style>
  .fd-background      { fill: #ffffff; fill: var(--fd-background, #ffffff); }
  .fd-title   { fill: #002a3a; fill: var(--fd-text, #002a3a); }
  .fd-field-box   { fill: #6983ff; fill: var(--fd-field-fill, #6983ff); stroke: #30176e; stroke: var(--fd-field-border, #30176e); stroke-width: 1; }
  .fd-padding-box     { fill: url(#fd-hatch); stroke: #b9c2cc; stroke: var(--fd-padding-stroke, #b9c2cc); stroke-width: 1; }
  .fd-flexible-array    { fill: none; stroke: #666666; stroke: var(--fd-muted, #666666); stroke-width: 1; stroke-dasharray: 4 3; }
  .fd-extra-box   { fill: #6983ff; fill: var(--fd-field-fill, #6983ff); fill-opacity: 0.55; stroke: #30176e; stroke: var(--fd-field-border, #30176e); stroke-width: 1; stroke-dasharray: 5 3; }
  .fd-slack-box   { fill: #666666; fill: var(--fd-muted, #666666); fill-opacity: 0.10; stroke: #666666; stroke: var(--fd-muted, #666666); stroke-width: 1; stroke-dasharray: 2 3; }
  .fd-slack-label { fill: #666666; fill: var(--fd-muted, #666666); }
  .fd-allocation-plus    { fill: #666666; fill: var(--fd-muted, #666666); }
  .fd-field-label   { fill: #ffffff; fill: var(--fd-field-text, #ffffff); }
  .fd-padding-label  { fill: #666666; fill: var(--fd-muted, #666666); }
  .fd-callout-label { fill: #002a3a; fill: var(--fd-text, #002a3a); }
  .fd-leader-line  { stroke: #666666; stroke: var(--fd-muted, #666666); stroke-width: 1; fill: none; }
  .fd-ruler-line   { stroke: #666666; stroke: var(--fd-muted, #666666); stroke-width: 1; }
  .fd-cache-line   { stroke: #002a3a; stroke: var(--fd-text, #002a3a); stroke-width: 3; stroke-dasharray: 7 4; opacity: 0.8; }
  .fd-cache-line-label    { fill: #002a3a; fill: var(--fd-text, #002a3a); }
  .fd-pointer-arrow  { stroke: #002a3a; stroke: var(--fd-text, #002a3a); stroke-width: 1.5; fill: none; }
  .fd-pointer-head   { fill: #002a3a; fill: var(--fd-text, #002a3a); }
  .fd-ruler-label    { fill: #666666; fill: var(--fd-muted, #666666); }
  .fd-note  { fill: #1e8e3e; fill: var(--fd-highlight, #1e8e3e); }
  .fd-note-plain { fill: #002a3a; fill: var(--fd-text, #002a3a); }
  text        { font-family: 'Fira Mono', Consolas, Menlo, Monaco, 'Courier New', monospace; font-family: var(--fd-font, 'Fira Mono', Consolas, Menlo, Monaco, 'Courier New', monospace); }
  .fd-hatch-background { fill: #f5f7f7; fill: var(--fd-padding-fill, #f5f7f7); }
  .fd-hatch-lines { stroke: #b9c2cc; stroke: var(--fd-padding-stroke, #b9c2cc); stroke-width: 1.5; }
  .fd-subdivision-line  { stroke: #ffffff; stroke: var(--fd-field-text, #ffffff); stroke-width: 1; stroke-dasharray: 2 3; opacity: 0.45; }
</style>
<rect class="fd-background" fill="#ffffff" width="100%" height="100%" rx="8"/>
<defs><pattern id="fd-hatch" width="6" height="6" patternTransform="rotate(45)" patternUnits="userSpaceOnUse"><rect class="fd-hatch-background" fill="#f5f7f7" width="6" height="6"/><line class="fd-hatch-lines" stroke="#b9c2cc" stroke-width="1.5" x1="0" y1="0" x2="0" y2="6"/></pattern></defs>
